# fly.toml app configuration file generated for pigeon-room on 2025-09-03T08:10:41Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pigeon-room'
primary_region = 'nrt'

[build]

[env]
  PORT = '8080'

[processes]
  app = 'run -A ./app.ts'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
