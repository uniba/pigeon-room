<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./reset.css">
  <link rel="stylesheet" href="./style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@200;400;600&display=swap" rel="stylesheet">

  <title>Pigeon room 🕊️</title>
</head>
<body>
  <header id="global_header">
    <div>
      <div id="flash"></div>
      <h1>Pigeon room 🕊️</h1>
    </div>
    <section class="property">
      <p id="myid">my id: ---</p>
      <p id="othersid">others id: ---</p>
      <div class="massaging">
        <section id="selector_wrap">
          <p>to: </p>
          <ul id="to_selector">
          </ul>
        </section>
        <section id="input">
          <span>message: </span>
          <input type="text" id="msgBodyInput" />
          <button id="sndMsg">send</button>
        </section>
      </div>
      <div class="sample_message">
        <button id="ping_to_host">ping to host</button>
        <button id="ping_to_others">ping to others</button>
        <button id="sndPipo">send "pipo" to all as message</button>
      </div>
    </section>
  </header id="global_header">
  <main>
    <ul id="msgs"></ul>
    <button id="clear">clear history</button>
  </main>
  <script type="module" src="./index.js"></script>
</body>
</html>
